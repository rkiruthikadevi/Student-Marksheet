<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDENTS MARKSHEET</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#ffffff;
    font-family:Arial, sans-serif;
    padding:20px;
}

.card{
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card-header{
    background:white;
    text-align:center;
    font-weight:bold;
}

.table{
    background:white;
}

.btn-primary{
    width:100%;
    font-weight:bold;
}

input{
    margin-bottom:12px;
}
</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Form -->

<div class="col-md-4">

<div class="card">

<div class="card-header">
<h3>STUDENTS MARKSHEET</h3>
</div>

<div class="card-body">

<label>NAME</label>
<input type="text" id="name" class="form-control" placeholder="Enter your Name">

<label>ROLL NO</label>
<input type="text" id="roll" class="form-control" placeholder="Enter your Roll No">

<label>SUBJECT 1</label>
<input type="number" id="sub1" class="form-control" placeholder="Enter mark">

<label>SUBJECT 2</label>
<input type="number" id="sub2" class="form-control" placeholder="Enter mark">

<label>SUBJECT 3</label>
<input type="number" id="sub3" class="form-control" placeholder="Enter mark">

<label>SUBJECT 4</label>
<input type="number" id="sub4" class="form-control" placeholder="Enter mark">

<label>SUBJECT 5</label>
<input type="number" id="sub5" class="form-control" placeholder="Enter mark">

<button class="btn btn-primary mt-2" onclick="addData()">Submit</button>

</div>

</div>

</div>

<!-- Table -->

<div class="col-md-8">

<table class="table table-bordered table-hover text-center">

<thead class="table-light">

<tr>
<th>S.NO</th>
<th>NAME</th>
<th>ROLL NO</th>
<th>SUB 1</th>
<th>SUB 2</th>
<th>SUB 3</th>
<th>SUB 4</th>
<th>SUB 5</th>
<th>TOTAL</th>
<th>GRADE</th>
<th>RESULT</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

</div>

<script>

let count=1;

function addData(){

let name=document.getElementById("name").value;
let roll=document.getElementById("roll").value;

let s1=Number(document.getElementById("sub1").value);
let s2=Number(document.getElementById("sub2").value);
let s3=Number(document.getElementById("sub3").value);
let s4=Number(document.getElementById("sub4").value);
let s5=Number(document.getElementById("sub5").value);

let total=s1+s2+s3+s4+s5;
let average=total/5;

let grade="";
let result="Pass";

if(s1<35 || s2<35 || s3<35 || s4<35 || s5<35){
    result="Fail";
}

if(average>=90){
    grade="A+";
}
else if(average>=80){
    grade="A";
}
else if(average>=70){
    grade="B";
}
else if(average>=60){
    grade="C";
}
else if(average>=50){
    grade="D";
}
else{
    grade="E";
}

let row=`
<tr>
<td>${count++}</td>
<td>${name}</td>
<td>${roll}</td>
<td>${s1}</td>
<td>${s2}</td>
<td>${s3}</td>
<td>${s4}</td>
<td>${s5}</td>
<td>${total}</td>
<td>${grade}</td>
<td>${result}</td>
</tr>
`;

document.getElementById("tableBody").innerHTML+=row;

document.getElementById("name").value="";
document.getElementById("roll").value="";
document.getElementById("sub1").value="";
document.getElementById("sub2").value="";
document.getElementById("sub3").value="";
document.getElementById("sub4").value="";
document.getElementById("sub5").value="";

}

</script>

</body>
</html>
